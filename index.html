<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign-up Form</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="background">
      <img class="background-image"src="photos/background.avif" alt="sunset on the California coast.">
    </div>
    <div class="content">
      <h2 class="text">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Nobis, eligendi explicabo? Rem magni id quaerat assumenda reprehenderit magnam. Rerum facilis beatae aliquam tenetur eligendi labore sed rem minima libero maiores!</h2>
      <h2 class="heading">Lorem, ipsum dolor sit.</h2>
      <form action="">
        <fieldset>
          <legend>Let's go!</legend>
          <label for="first-name">FIRST NAME</label>
          <input type="text" id="first-name">
          <label for="last-name">LAST NAME</label>
          <input type="text" id="last-name">
          <label for="email">EMAIL</label>
          <input type="email" id="email">
          <label for="phone">PHONE NUMBER</label>
          <input type="tel" id="phone">
          <label for="password">PASSWORD</label>
          <input type="password" id="password">
          <label for="confirm-password">CONFIRM PASSWORD</label>
          <input type="password" id="confirm-password">
        </fieldset>
        <button>Create Account</button>
      </form>
      <p>Already have an account? <a href="">Log in</a></p>
    </div>
  </div>
</body>
</html>
