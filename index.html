<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign-up Form</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="background">
      <img class="background-image"src="photos/background.avif" alt="sunset on the California coast.">
      <div class="odin-container">
        <img class="odin"src="photos/odin-logo.png" alt="odin logo">
      </div>
    </div>
    <div class="content">
      <h3 class="text">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Nobis, eligendi explicabo? Rem magni id quaerat assumenda reprehenderit magnam. Rerum facilis beatae aliquam tenetur eligendi labore sed rem minima libero maiores!</h3>
      <h3 class="heading">Lorem, ipsum dolor sit.</h3>
      <form action="">
        <div class="border">
          <h3 class="legend">Let's go!</h3>
          <div class="form-container">
            <label for="first-name">FIRST NAME
            <input type="text" id="first-name"></label>
            <label for="last-name">LAST NAME
            <input type="text" id="last-name"></label>
            <label for="email">EMAIL
            <input type="email" id="email"></label>
            <label for="phone">PHONE NUMBER
            <input type="tel" id="phone"></label>
            <label for="password">PASSWORD
            <input type="password" id="password"></label>
            <label for="confirm-password">CONFIRM PASSWORD
            <input type="password" id="confirm-password"></label>
          </div>
        </div>
        <button>Create Account</button>
      </form>
      <p>Already have an account? <a href="">Log in</a></p>
    </div>
  </div>
</body>
</html>
